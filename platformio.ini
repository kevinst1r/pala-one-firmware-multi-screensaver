; PlatformIO Project Configuration
;
; The repo is dual-build: the same sources compile under both Arduino IDE 2
; and PlatformIO. See README.md for the trade-off and per-build setup.
;
; Layout:
;   Pala_One_2_1/Pala_One_2_1.ino    — Arduino-IDE entry, also compiled by PIO
;   Pala_One_2_1/pala_api.h          — public app API headers (used by examples/)
;   Pala_One_2_1/pala_app.h
;   Pala_One_2_1/src/                — firmware modules (hal/, pure/, storage/, ui/, web/)
;   Pala_One_2_1/partitions.csv      — partition table
;
; src_dir is set to the sketch folder so PIO picks up both the .ino and
; everything under src/. Firmware sources use full-from-sketch-root includes
; like `#include "src/hal/display.h"` — same path resolves under Arduino IDE
; (sketch folder root is on its include path; `src/` is not, hence the prefix).
; See README.md "Include style" for the why.

[platformio]
src_dir = Pala_One_2_1

[env]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = Pala_One_2_1/partitions.csv
board_build.filesystem = littlefs
extra_scripts = pre:scripts/build_info.py

; test/ holds host-side CMake unit tests, not PlatformIO on-device tests.
; Tell `pio test` to ignore everything in there so it doesn't try to compile
; laptop-only tests onto the ESP32.
test_ignore = *

lib_deps =
  https://github.com/todd-herbert/heltec-eink-modules.git
  adafruit/Adafruit GFX Library
  olikraus/U8g2_for_Adafruit_GFX

[env:wireless-paper-v1_2]
build_flags =
  -D WIRELESS_PAPER
  -D DISPLAY_V1_2

[env:wireless-paper-v1_1]
build_flags =
  -D WIRELESS_PAPER
  -D DISPLAY_V1_1
